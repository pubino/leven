name: Leven
options:
  bundleIdPrefix: com.leven
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

targets:
  Leven:
    type: application
    platform: macOS
    sources:
      - Leven/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leven.app
        PRODUCT_NAME: Leven
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Leven/Info.plist
        CODE_SIGN_ENTITLEMENTS: Leven/Leven.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Leven/Leven.entitlements
